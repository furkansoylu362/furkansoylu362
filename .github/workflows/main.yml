name: Generate Snake

on:
  schedule:
    # Her 12 saatte bir otomatik çalışır
    - cron: "0 */12 * * *"
  # Manuel olarak tetikleyebilmemiz için
  workflow_dispatch:
  # Main branch'e her push yapıldığında çalışır
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Güncel checkout v4 kullanıyoruz (Node uyarısı vermez)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Güncel Platane/snk aksiyonu
      - name: Generate GitHub Contribution Grid Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Oluşan dosyaları doğrudan 'output' branch'ine güvenli şekilde pushlar
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

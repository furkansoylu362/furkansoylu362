name: Generate Snake

on:
  schedule:
    # Her 6 saatte bir çalışır
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Hata vermeyen güncel checkout sürümü
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Senin attığın makaledeki orijinal Platane/snk mantığının güncel v3 sürümü
      # Bu sayede yılanın senin katkı kutularını (contribution graph) akıllıca hedefler!
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: furkansoylu362
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Değişiklikleri güvenli bir şekilde output branch'ine gönderir
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
